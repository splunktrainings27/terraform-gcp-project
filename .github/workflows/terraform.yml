name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform Pipeline
    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # STEP 1 - Checkout Code
      # ---------------------------
      - name: 1️⃣ Checkout Repository
        uses: actions/checkout@v3

      # ---------------------------
      # STEP 2 - Install Terraform
      # ---------------------------
      - name: 2️⃣ Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # ---------------------------
      # STEP 3 - Authenticate GCP
      # ---------------------------
      - name: 3️⃣ Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # ---------------------------
      # STEP 4 - Terraform Init
      # ---------------------------
      - name: 4️⃣ Terraform Init
        run: terraform init -reconfigure

      # ---------------------------
      # STEP 5 - Terraform Format Check
      # ---------------------------
      - name: 5️⃣ Terraform Format
        run: terraform fmt -check

      # ---------------------------
      # STEP 6 - Terraform Validate
      # ---------------------------
      - name: 6️⃣ Terraform Validate
        run: terraform validate

      # ---------------------------
      # STEP 7 - Terraform Plan
      # ---------------------------
      - name: 7️⃣ Terraform Plan
        run: terraform plan

      # ---------------------------
      # STEP 8 - Terraform Apply
      # ---------------------------
      - name: 8️⃣ Terraform Apply
        run: terraform apply -auto-approve
